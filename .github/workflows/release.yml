name: Release AstraOS

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Build AstraOS ISO
        run: |
          chmod +x build/build.sh
          sudo bash build/build.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "⭐ AstraOS v1.0.0 Nova"
          tag_name: v1.0.0
          body: |
            ## ⭐ AstraOS v1.0.0 "Nova" — First Stable Release

            > *As high as stars, illuminating all users*

            ### 🖥️ Desktop
            - KDE Plasma Desktop Environment
            - SDDM Login Screen (custom AstraOS theme)
            - Custom wallpaper & logo AstraOS
            - Firefox ESR browser

            ### 🧑‍💻 DevMode
            - Python 3, Node.js, Go, Rust
            - GCC, G++, Make, CMake
            - Neovim, Tmux, Zsh, Git
            - Docker

            ### 🛡️ ShieldMode
            - Nmap, Tcpdump, Netcat
            - Tor, OpenVPN, Wireguard
            - UFW, Fail2ban, ClamAV
            - Proxychains4

            ### 🔬 LabMode
            - Python Data Stack (NumPy, Pandas, Matplotlib)
            - Scikit-learn, Scipy, Seaborn
            - SQLite3, Gnuplot

            ### ⚡ AstraOS Features
            - Switch mode: `astra switch --mode <name>`
            - Built-in installer: `sudo astra-install`
            - 4 GRUB boot modes
            - Custom MOTD & branding

            ### 💾 How to Install
            1. Download `astraos.iso`
            2. Flash ke USB: `dd if=astraos.iso of=/dev/sdX bs=4M`
            3. Boot dari USB
            4. Jalankan `sudo astra-install`

            ### 🔑 Default credentials (Live mode)
            - Username: `astra`
            - Password: `astra`

          files: output/astraos.iso
          draft: false
          prerelease: false
