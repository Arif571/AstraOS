name: Build AstraOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Build AstraOS ISO
        run: |
          chmod +x build/build.sh
          sudo bash build/build.sh

      - name: Show output
        if: always()
        run: ls -lh output/ 2>/dev/null || echo "No output folder"

      - name: Upload ISO
        uses: actions/upload-artifact@v4.6.2
        with:
          name: AstraOS-ISO
          path: output/*.iso
          if-no-files-found: warn
          retention-days: 7
