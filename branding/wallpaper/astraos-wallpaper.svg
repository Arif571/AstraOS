<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Nebula glow -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="url(#glow1)"/>
  <ellipse cx="300" cy="200" rx="200" ry="150" fill="#0033aa" opacity="0.1"/>
  <ellipse cx="1600" cy="800" rx="250" ry="180" fill="#003366" opacity="0.15"/>

  <!-- Stars field -->
  <g fill="#ffffff">
    <circle cx="100" cy="50" r="1.5" opacity="0.9"/>
    <circle cx="250" cy="120" r="1" opacity="0.7"/>
    <circle cx="400" cy="30" r="2" opacity="0.8"/>
    <circle cx="600" cy="80" r="1" opacity="0.6"/>
    <circle cx="800" cy="40" r="1.5" opacity="0.9"/>
    <circle cx="1000" cy="90" r="1" opacity="0.7"/>
    <circle cx="1200" cy="20" r="2" opacity="0.8"/>
    <circle cx="1400" cy="70" r="1" opacity="0.6"/>
    <circle cx="1600" cy="50" r="1.5" opacity="0.9"/>
    <circle cx="1800" cy="100" r="1" opacity="0.7"/>
    <circle cx="150" cy="200" r="1" opacity="0.5"/>
    <circle cx="350" cy="300" r="1.5" opacity="0.8"/>
    <circle cx="550" cy="180" r="1" opacity="0.6"/>
    <circle cx="750" cy="250" r="2" opacity="0.9"/>
    <circle cx="950" cy="150" r="1" opacity="0.7"/>
    <circle cx="1150" cy="280" r="1.5" opacity="0.8"/>
    <circle cx="1350" cy="200" r="1" opacity="0.6"/>
    <circle cx="1550" cy="170" r="2" opacity="0.9"/>
    <circle cx="1750" cy="230" r="1" opacity="0.7"/>
    <circle cx="50" cy="400" r="1.5" opacity="0.8"/>
    <circle cx="300" cy="450" r="1" opacity="0.6"/>
    <circle cx="500" cy="380" r="2" opacity="0.9"/>
    <circle cx="700" cy="420" r="1" opacity="0.7"/>
    <circle cx="900" cy="350" r="1.5" opacity="0.8"/>
    <circle cx="1100" cy="430" r="1" opacity="0.6"/>
    <circle cx="1300" cy="390" r="2" opacity="0.9"/>
    <circle cx="1500" cy="410" r="1" opacity="0.7"/>
    <circle cx="1700" cy="360" r="1.5" opacity="0.8"/>
    <circle cx="1900" cy="440" r="1" opacity="0.6"/>
    <circle cx="200" cy="600" r="1" opacity="0.5"/>
    <circle cx="450" cy="650" r="1.5" opacity="0.7"/>
    <circle cx="650" cy="580" r="1" opacity="0.6"/>
    <circle cx="850" cy="620" r="2" opacity="0.8"/>
    <circle cx="1050" cy="560" r="1" opacity="0.7"/>
    <circle cx="1250" cy="640" r="1.5" opacity="0.8"/>
    <circle cx="1450" cy="590" r="1" opacity="0.6"/>
    <circle cx="1650" cy="630" r="2" opacity="0.9"/>
    <circle cx="1850" cy="570" r="1" opacity="0.7"/>
    <circle cx="100" cy="800" r="1.5" opacity="0.8"/>
    <circle cx="350" cy="850" r="1" opacity="0.6"/>
    <circle cx="600" cy="780" r="2" opacity="0.9"/>
    <circle cx="800" cy="900" r="1" opacity="0.7"/>
    <circle cx="1000" cy="820" r="1.5" opacity="0.8"/>
    <circle cx="1200" cy="870" r="1" opacity="0.6"/>
    <circle cx="1400" cy="800" r="2" opacity="0.9"/>
    <circle cx="1600" cy="950" r="1" opacity="0.7"/>
    <circle cx="1800" cy="880" r="1.5" opacity="0.8"/>
  </g>

  <!-- Blue glowing stars -->
  <g fill="#00d4ff" filter="url(#blur)">
    <circle cx="200" cy="100" r="2" opacity="0.8"/>
    <circle cx="700" cy="300" r="2.5" opacity="0.7"/>
    <circle cx="1300" cy="150" r="2" opacity="0.9"/>
    <circle cx="1700" cy="500" r="3" opacity="0.6"/>
    <circle cx="500" cy="700" r="2" opacity="0.8"/>
    <circle cx="1100" cy="900" r="2.5" opacity="0.7"/>
  </g>

  <!-- Center logo star -->
  <g transform="translate(960, 480)" filter="url(#softglow)">
    <polygon points="0,-80 9,-30 60,-50 20,-5 80,10 30,35 50,90 0,55 -50,90 -30,35 -80,10 -20,-5 -60,-50 -9,-30"
      fill="#00d4ff" opacity="0.9"/>
  </g>

  <!-- Orbit rings around center -->
  <ellipse cx="960" cy="480" rx="180" ry="55" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3" transform="rotate(-30 960 480)"/>
  <ellipse cx="960" cy="480" rx="180" ry="55" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3" transform="rotate(30 960 480)"/>
  <ellipse cx="960" cy="480" rx="180" ry="55" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- AstraOS text -->
  <text x="960" y="620" text-anchor="middle"
    font-family="monospace" font-size="72" font-weight="bold"
    fill="#00d4ff" opacity="0.9" filter="url(#softglow)" letter-spacing="15">
    AstraOS
  </text>
  <text x="960" y="660" text-anchor="middle"
    font-family="monospace" font-size="22"
    fill="#ffffff" opacity="0.5" letter-spacing="8">
    As high as stars, illuminating all users
  </text>
</svg>
